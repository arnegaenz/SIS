<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <script>try{var t=localStorage.getItem('sis-theme');if(t)document.documentElement.setAttribute('data-theme',t)}catch(e){}</script>
  <title>System Monitor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <link rel="stylesheet" href="../sis-shared.css?v=navfix" />
  <link rel="stylesheet" href="../assets/css/sis.css" />
  <link rel="stylesheet" href="../assets/css/dashboards.css" />
  <link rel="stylesheet" href="../assets/css/mobile.css" />
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/passcode-gate.js"></script>
  <script defer src="../assets/js/sis.js"></script>
  <script defer src="../assets/js/nav.js"></script>
  <script type="module" defer src="../assets/js/monitor-dashboard.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function(){
      if (window.renderHeaderNav && !window.__sisHeaderNav_monitor) {
        window.__sisHeaderNav_monitor = true;
        window.renderHeaderNav({
          currentId: "monitor",
          title: "System Monitor",
          subtitle: "Instance health, traffic anomalies, merchant alerts, pipeline status."
        });
      }
    });
  </script>
</head>
<body>
  <div id="sis-header"></div>
  <div class="dashboard-shell">
    <!-- Non-kiosk toolbar -->
    <div class="monitor-toolbar" id="monitorToolbar">
      <button class="btn-secondary" id="kioskEnterBtn" type="button">Kiosk View</button>
      <span class="monitor-last-updated" id="lastUpdated"></span>
    </div>

    <!-- Overall Status Banner -->
    <div class="monitor-banner" id="overallBanner">
      <div class="monitor-banner__dot"></div>
      <div class="monitor-banner__text">Checking systems...</div>
    </div>

    <!-- Instance Status Board -->
    <div class="monitor-section-title">INSTANCES <span class="monitor-help" title="Each CardSavr instance is checked every 5 minutes. Frontend: HTTP request to a live cardupdatr.app page — tests DNS, hosting, SSL, and app serving. Backend: API login via CardSavr SDK — tests authentication and API responsiveness. Response times under 1s are green, 1-3s yellow, over 3s or failed is red. Sparkline shows response time trend over the last hour. Uptime % is based on successful checks in the last hour.">?</span></div>
    <div class="monitor-instance-strip" id="instanceGrid">
      <div class="monitor-loading">Checking instances...</div>
    </div>

    <!-- Data Pipeline -->
    <div class="monitor-section-title">DATA PIPELINE <span class="monitor-help" title="Monitors the freshness of SIS data caches. Placements Cache: live card placement data, refreshed every 15 minutes from CardSavr API. Sessions Cache: live cardholder session data, refreshed every 15 minutes. GA Realtime: Google Analytics realtime snapshots collected every 5 minutes. Instance Connectivity: tracks which CardSavr instances failed their last API login attempt. Green = fresh (under 15 min), yellow = getting stale (15-30 min), red = stale (over 30 min).">?</span></div>
    <div class="monitor-pipeline-strip" id="pipelineStatus">
      <div class="monitor-loading">Checking pipeline...</div>
    </div>

    <!-- Bottom: Map+Totals (left) | Feed (right) -->
    <div class="monitor-bottom-split">
      <div class="monitor-bottom-left">
        <div class="monitor-section-title">TRAFFIC MAP <span class="monitor-help" title="Live geographic distribution of CardUpdatr traffic across the United States. Dot size indicates number of active users in each city. Data from GA realtime snapshots (last 30 minutes). International traffic shown as a count below the map.">?</span></div>
        <div class="monitor-map-container" id="trafficMap"></div>
        <div class="monitor-section-title">SYSTEM TOTALS (TODAY)</div>
        <div id="monitorTotals" class="monitor-totals-strip"></div>
      </div>
      <div class="monitor-bottom-right">
        <div class="monitor-section-title">LIVE ACTIVITY <span class="monitor-help" title="Real-time feed of recent session and placement events across all CardSavr instances. Shows the last 50 events, refreshed every 30 seconds.">?</span></div>
        <div class="monitor-feed" id="monitorFeed">
          <div class="monitor-loading">Loading activity feed...</div>
        </div>
      </div>
    </div>

    <!-- Detail Modal -->
    <div class="detail-modal-overlay" id="monitorModalOverlay" style="display:none;">
      <div class="detail-modal" id="monitorModal">
        <div class="detail-modal__header">
          <div>
            <div class="detail-modal__name" id="monitorModalName"></div>
            <div class="detail-modal__subtitle" id="monitorModalSubtitle"></div>
          </div>
          <button class="detail-modal__close" id="monitorModalClose">&times;</button>
        </div>
        <div id="monitorModalContent"></div>
      </div>
    </div>
  </div>
</body>
</html>
