<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>SIS — Redirecting</title>
  <script>
    (function() {
      try {
        var userJson = localStorage.getItem("sis_user");
        if (!userJson) {
          window.location.replace("./login.html");
          return;
        }
        var user = JSON.parse(userJson);
        var level = (user && user.access_level) || "";
        if (level === "full") level = "admin";
        if (level === "limited") level = "fi";
        var landingPages = {
          "admin":     "./dashboards/portfolio.html",
          "core":      "./dashboards/portfolio.html",
          "internal":  "./dashboards/portfolio.html",
          "siteops":   "./dashboards/success.html",
          "support":   "./troubleshoot-customer.html",
          "cs":        "./dashboards/portfolio.html",
          "executive": "./dashboards/executive.html",
          "partner":   "./funnel-customer.html",
          "fi":        "./funnel-customer.html"
        };
        window.location.replace(landingPages[level] || "./funnel-customer.html");
      } catch (e) {
        window.location.replace("./login.html");
      }
    })();
  </script>
</head>
<body></body>
</html>
